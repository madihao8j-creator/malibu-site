<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موضوع | Malibu Glow Up</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="site-header-mount"></div>

  <section class="topic-hero" id="topic-hero">
    <div class="topic-hero-overlay"></div>
    <div class="topic-hero-inner container">
      <h1 class="topic-eyebrow" id="topic-eyebrow"></h1>
    </div>
    <div id="video-badge-wrap"></div>
  </section>

  <div class="container">
    <p class="topic-intro reveal-el" id="topic-intro"></p>

    <div class="qa-grid" id="qa-grid"></div>

    <div class="summary-box reveal-el">
      <h3 id="summary-title"></h3>
      <p id="summary-text"></p>
    </div>

    <div class="section-heading reveal-el">
      <h2 id="results-title"></h2>
      <div class="divider"></div>
      <p id="results-desc"></p>
    </div>
    <div class="results-grid" id="results-grid"></div>
  </div>

  <div id="site-footer-mount"></div>

  <script src="topics-data.js"></script>
  <script src="header-footer.js"></script>
  <script src="main.js"></script>
  <script src="topic-page.js"></script>
</body>
</html>
